<mat-toolbar class="navbar-toolbar">
    <div class="navbar-container">
        <!-- Logo -->
        <div class="logo-container">
            <img src="/logos/logo.png" alt="Logo Agro" class="logo-image" />
            <span class="logo-text">Portal Agro-comercial del Huila</span>
        </div>

        <!-- Categorías -->
        <button mat-button [matMenuTriggerFor]="categoriesMenu" class="categories-button">
            <span>Categorías</span>
            <mat-icon>expand_more</mat-icon>
        </button>
        <mat-menu #categoriesMenu="matMenu">
            <button mat-menu-item *ngFor="let category of categories" (click)="onCategoryClick(category)">
                {{ category }}
            </button>
        </mat-menu>

        <!-- Buscador -->
        <div class="search-container">
            <div class="input-group search-field">
                <span class="input-group-text search-icon">
                    <i class="bi bi-search"></i>
                </span>
                <input type="search" class="form-control" placeholder="Buscar productos, servicios, empresas..."
                    [(ngModel)]="searchTerm" (keyup)="onKeyUp($event)" (focus)="onSearchFocus()" (blur)="onSearchBlur()"
                    name="searchTerm" />
                <button *ngIf="searchTerm" type="button" class="btn btn-outline-secondary clear-button"
                    (click)="clearSearch()">
                    <i class="bi bi-x-lg"></i>
                </button>
            </div>
            <div class="search-suggestions" *ngIf="showSuggestions && searchSuggestions.length > 0">
                <div class="suggestion-item d-flex align-items-center" *ngFor="let suggestion of searchSuggestions"
                    (click)="selectSuggestion(suggestion)">
                    <i class="bi bi-search me-2 text-muted"></i>
                    <span>{{ suggestion }}</span>
                </div>
            </div>
        </div>

        <!-- Navegación -->
        <div class="nav-menu mt-3">
            <button mat-button class="categories-button" *ngFor="let item of navigationItems"
                (click)="onNavigationClick(item)">
                <span>{{ item.label }}</span>
            </button>
        </div>

        <!-- Acciones de usuario -->
        <div class="user-actions">
            <!-- Notificaciones -->
            <button mat-icon-button [matMenuTriggerFor]="notificationsMenu" [matBadge]="unreadNotifications"
                matBadgeColor="warn" [matBadgeHidden]="unreadNotifications === 0" class="action-button">
                <mat-icon>notifications</mat-icon>
            </button>
            <mat-menu #notificationsMenu="matMenu" class="notifications-menu">
                <div class="notifications-header">
                    <h4>Notificaciones</h4>
                    <span class="notifications-count">Hoy</span>
                </div>
                <mat-divider></mat-divider>
                <div class="notifications-content" *ngIf="notifications.length > 0; else noNotifications">
                    <div class="notification-item" *ngFor="let notification of notifications"
                        [class.unread]="!notification.read" (click)="markAsRead(notification)">
                        <div class="notification-avatar">
                            <mat-icon [class]="'status-' + notification.type">{{ notification.icon }}</mat-icon>
                        </div>
                        <div class="notification-content">
                            <p class="notification-title">{{ notification.title }}</p>
                            <p class="notification-description">{{ notification.description }}</p>
                            <small class="notification-time">{{ notification.time }}</small>
                        </div>
                        <div class="notification-dot" *ngIf="!notification.read"></div>
                    </div>
                </div>
                <ng-template #noNotifications>
                    <div class="no-notifications">
                        <mat-icon>notifications_none</mat-icon>
                        <p>No tienes notificaciones</p>
                    </div>
                </ng-template>
                <mat-divider></mat-divider>
                <button mat-menu-item class="view-all-button">
                    <mat-icon>visibility</mat-icon>
                    <span>Ver todas</span>
                </button>
            </mat-menu>

            <!-- Carrito -->
            <button mat-icon-button (click)="onCartClick()" [matBadge]="cartCount" matBadgeColor="warn"
                [matBadgeHidden]="cartCount === 0" class="action-button">
                <mat-icon>shopping_cart</mat-icon>
            </button>

            <!-- Usuario -->
            <button mat-icon-button [matMenuTriggerFor]="userMenu" class="user-button">
                <div class="user-avatar">
                    <img [src]="user.avatar" [alt]="user.name" *ngIf="user.avatar; else defaultAvatar">
                    <ng-template #defaultAvatar>
                        <mat-icon>account_circle</mat-icon>
                    </ng-template>
                </div>
            </button>
            <mat-menu #userMenu="matMenu" class="user-dropdown-menu">
                <div class="user-menu-header">
                    <div class="user-menu-info">
                        <h4>{{ user.name }}</h4>
                    </div>
                </div>
                <mat-divider></mat-divider>

                <button mat-menu-item *ngFor="let option of userOptions" (click)="onUserOptionClick(option.label)"
                    class="user-menu-option">
                    <mat-icon class="menu-icon">{{ option.icon }}</mat-icon>
                    <span>{{ option.label }}</span>
                </button>

                <mat-divider></mat-divider>

                <button mat-menu-item (click)="onUserOptionClick('Cerrar Sesión')" class="logout-option">
                    <mat-icon class="menu-icon logout-icon">power_settings_new</mat-icon>
                    <span>Cerrar Sesión</span>
                </button>
            </mat-menu>
        </div>
    </div>
</mat-toolbar>
